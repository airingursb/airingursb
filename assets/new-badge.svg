<svg xmlns="http://www.w3.org/2000/svg" width="36" height="16" viewBox="0 0 36 16">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0080">
        <animate attributeName="stop-color"
                 values="#FF0080;#7928CA;#00D4FF;#7928CA;#FF0080"
                 dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7928CA">
        <animate attributeName="stop-color"
                 values="#7928CA;#00D4FF;#FF0080;#00D4FF;#7928CA"
                 dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="36" height="16" rx="3" fill="url(#g)"/>
  <text x="18" y="11.5"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle"
        letter-spacing="0.6">NEW</text>
</svg>
